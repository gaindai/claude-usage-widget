name: ClaudeUsage
options:
  bundleIdPrefix: ai.gaind
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    # Kein get-task-allow injizieren — würde Debugger-Attach erlauben und damit
    # das Hardened-Runtime-Hardening aushebeln.
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
schemes:
  ClaudeUsage:
    build:
      targets:
        ClaudeUsage: all
    run:
      config: Release
    archive:
      config: Release
targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Shared
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Claude Usage
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "© 2026 gaind"
    dependencies:
      - target: ClaudeUsageWidget
        embed: true
    settings:
      base:
        PRODUCT_NAME: Claude Usage
        PRODUCT_BUNDLE_IDENTIFIER: ai.gaind.claudeusage
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ClaudeUsageWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Widget
      - path: Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Claude Usage
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/Widget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.temporary-exception.files.home-relative-path.read-only:
          - /Library/Application Support/ClaudeUsage/
    settings:
      base:
        PRODUCT_NAME: ClaudeUsageWidget
        PRODUCT_BUNDLE_IDENTIFIER: ai.gaind.claudeusage.widget
        SKIP_INSTALL: YES
